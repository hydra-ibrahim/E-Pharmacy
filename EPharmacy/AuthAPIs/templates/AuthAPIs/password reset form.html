{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{%static 'AuthAPIs/bootstrap-5.3.3-dist/css/bootstrap.min.css'%}"
    />
    <script src="{%static 'AuthAPIs/bootstrap-5.3.3-dist/js/bootstrap.min.js'%}"></script>
    <title>Password Reset Form</title>
  </head>

  <body>
    <section style="background-color: #eee">
      <div class="container min-vh-100">
        <div
          class="row d-flex justify-content-center align-items-center min-vh-100"
        >
          <div class="col-lg-12 col-xl-11">
            <div class="card text-black" style="border-radius: 25px">
              <div class="card-body p-md-5">
                <div class="row justify-content-center">
                  <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                    <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">
                      Password Reset
                    </p>

                    <form class="mx-1 mx-md-4">
                      <div class="d-flex flex-row align-items-center mb-4">
                        <i class="fas fa-lock fa-lg me-3 fa-fw"></i>
                        <div
                          data-mdb-input-init
                          class="form-outline flex-fill mb-0"
                        >
                          <input
                            type="password"
                            id="form3Example3c"
                            class="form-control"
                          />
                          <label class="form-label" for="form3Example3c"
                            >New Password</label
                          >
                        </div>
                      </div>

                      <div class="d-flex flex-row align-items-center mb-4">
                        <i class="fas fa-key fa-lg me-3 fa-fw"></i>
                        <div
                          data-mdb-input-init
                          class="form-outline flex-fill mb-0"
                        >
                          <input
                            type="password"
                            id="form3Example3cd"
                            class="form-control"
                          />
                          <label class="form-label" for="form3Example3cd"
                            >Repeat your password</label
                          >
                        </div>
                      </div>

                      <div
                        class="d-flex justify-content-center mx-4 mb-3 mb-lg-4"
                      >
                        <button
                          type="button"
                          data-mdb-button-init
                          data-mdb-ripple-init
                          class="btn btn-primary btn-lg"
                          onclick="resetPassword()"
                        >
                          Reset Password
                        </button>
                      </div>
                    </form>
                  </div>

                  <div
                    class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2"
                  >
                    <img
                      src="{%static 'AuthAPIs/images/password reset submit.png'%}"
                      class="img-fluid"
                      alt="Sample image"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script>
      function resetPassword() {

        var passValue = document.getElementById("form3Example3c").value;
        var confpassValue = document.getElementById("form3Example3cd").value;
        var brk = false;

        // we use strict validation ( !== ) because it's a good practice.
        if (passValue !== confpassValue) {
          alert("Passwords do not match!");
          brk = true;
        }

        {% comment %} console.log(brk); {% endcomment %}

        if (!brk) {
          fetch(`http://127.0.0.1:8000/api/auth/password/reset/confirm/`, {
            method: "POST",
            body: JSON.stringify({
              token: "{{token}}",
              uid: "{{uidb64}}",
              new_password1: document.getElementById("form3Example3c").value,
              new_password2: document.getElementById("form3Example3cd").value,
            }),
            headers: {
              "Content-type": "application/json",
            },
            mode: "cors",
          })
            .then((response) => {
              if (!response.ok) {
                throw new Error("Network response was not ok");
              }
              return response.json();
            })
            .then((data) => {
              alert("Your password has been reset successfully!");
            })
            .catch((error) => {
              console.error("Error:", error);
            });
        }
      }
    </script>
  </body>
</html>
