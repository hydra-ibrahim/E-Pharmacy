<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.min.css">
    <style>
        table {
            text-align: center;
            width: 100%;
        }

        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <section style="background-color: #eee;">
        <div class="container min-vh-100">
            <div class="row d-flex justify-content-center align-items-center min-vh-100">
                <div class="col-lg-12 col-xl-12">
                    <div class="card text-black" style="border-radius: 25px;">
                        <div class="card-body p-md-5">
                            <div class="row justify-content-center">
                                <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">

                                    <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">Sign up</p>

                                    <form class="mx-1 mx-md-4">

                                        <div class="d-flex flex-row align-items-center mb-4">
                                            <i class="fa fa-user fa-lg me-3 fa-fw"></i>
                                            <div data-mdb-input-init class="form-outline flex-fill mb-0"><span
                                                    id="username-error" class="error-message"></span>
                                                <input type="text" id="form3Example1c" class="form-control" />
                                                <label class="form-label" for="form3Example1c">Username</label>
                                            </div>
                                        </div>

                                        <div class="d-flex flex-row align-items-center mb-4">
                                            <i class="fa fa-envelope fa-lg me-3 fa-fw"></i>
                                            <div data-mdb-input-init class="form-outline flex-fill mb-0"><span
                                                    id="email-error" class="error-message"></span>
                                                <input type="email" id="form3Example2c" class="form-control" />
                                                <label class="form-label" for="form3Example2c">Your Email</label>
                                            </div>
                                        </div>

                                        <div class="d-flex flex-row align-items-center mb-4">
                                            <i class="fa fa-lock fa-lg me-3 fa-fw"></i>
                                            <div data-mdb-input-init class="form-outline flex-fill mb-0"><span
                                                    id="password1-error" class="error-message"></span>
                                                <input type="password" id="form3Example3c" class="form-control" />
                                                <label class="form-label" for="form3Example3c">Password</label>
                                            </div>
                                        </div>

                                        <div class="d-flex flex-row align-items-center mb-4">
                                            <i class="fa fa-key fa-lg me-3 fa-fw"></i>
                                            <div data-mdb-input-init class="form-outline flex-fill mb-0"><span
                                                    id="password2-error" class="error-message"></span>
                                                <input type="password" id="form3Example3cd" class="form-control" />
                                                <label class="form-label" for="form3Example3cd">Repeat your
                                                    password</label>
                                            </div>
                                        </div>


                                        <div class="row-1 d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                                            <button type="button" data-mdb-button-init data-mdb-ripple-init
                                                class="btn btn-primary btn-lg" onclick="register()">Register</button>
                                        </div>

                                        <div class="row-1 d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                                            <span id="email-status"></span>
                                        </div>


                                    </form>

                                    <div class="row">
                                        <div class="col-12">
                                            <div
                                                class="d-flex gap-2 gap-md-4 flex-column flex-md-row justify-content-md-center mt-4">
                                                <p class="m-0 text-secondary text-center">Already have an account? <a
                                                        href="sign in.html"
                                                        class="link-primary text-decoration-none">Sign in</a></p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">

                                    <img src="img/draw1.webp" class="img-fluid" alt="Sample image">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script>

        function register() {

            if (!validateForm()) return

            emailStatus = document.getElementById('email-status')
            emailStatus.textContent = 'Wait for a while'

            errors = document.getElementsByClassName('error-message')

            fetch('http://127.0.0.1:8000/api/auth/register/',
                {
                    method: "POST",
                    body: JSON.stringify({
                        username: document.getElementById('form3Example1c').value,
                        email: document.getElementById('form3Example2c').value,
                        password1: document.getElementById('form3Example3c').value,
                        password2: document.getElementById('form3Example3cd').value
                    }),
                    headers: {
                        "Content-type": "application/json",
                    },
                    mode: "cors",
                }
            )
                .then(response => {
                    emailStatus.textContent = ''
                    if (!response.ok) {
                        response.text().then(text => {
                            for (err of errors) err.innerText = ''

                            val_res = JSON.parse(text)
                            for (const [key, value] of Object.entries(val_res)) {
                                if (key == 'non_field_errors') document.getElementById('password1-error').innerText = value
                                else document.getElementById(`${key}-error`).innerText = value
                            }
                        })
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    for (err of errors) err.innerText = ''
                    alert("We've sent you an activation email!")
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }

        function validateForm() {
            const password1 = document.getElementById("form3Example3c").value;
            const password2 = document.getElementById("form3Example3cd").value;
            const email = document.getElementById("form3Example2c").value;
            const username = document.getElementById("form3Example1c").value;

            const password1Error = document.getElementById(
                "password1-error"
            );
            const password2Error = document.getElementById(
                "password2-error"
            );
            const emailError = document.getElementById(
                "email-error"
            );
            const usernameError = document.getElementById(
                "username-error"
            );

            password1Error.textContent = "";
            password2Error.textContent = "";
            emailError.textContent = "";
            usernameError.textContent = "";

            let isValid = true;

            if (email === "" || !/^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$/g.test(email)) {
                emailError.textContent =
                    "Please enter a valid email address.";
                isValid = false;
            }

            if (password1 === "" || !/^(?=.*[^\d]).{8,}$/g.test(password1)) {
                password1Error.textContent =
                    "Please enter a password with at least 8 characters and not all of them are digits.";
                isValid = false;
            }

            if (password1 !== password2) {
                password2Error.textContent = "Password and Repeat your password fields have to be identical."
                isValid = false;
            }

            if (username === "") {
                usernameError.textContent =
                    "Please enter a username.";
                isValid = false;
            }

            return isValid;
        }
    </script>
</body>

</html>
